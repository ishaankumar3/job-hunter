"on":
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  search-and-email:
    name: Search Jobs & Send Email
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Job Search
        env:
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          ADZUNA_APP_ID:     ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:    ${{ secrets.ADZUNA_APP_KEY }}
          REED_API_KEY:      ${{ secrets.REED_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python job_search.py

      - name: Commit Updated Tracker to Repo
        if: always()
        run: |
          git config user.name  "Job Hunter Bot"
          git config user.email "bot@job-hunter"
          git add job_tracker.xlsx seen_jobs.json || true
          git diff --staged --quiet || git commit -m "tracker: update job log $(date +'%Y-%m-%d')"
          git push || true

      - name: Upload Tracker as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-tracker-${{ github.run_id }}
          path: job_tracker.xlsx
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Email Preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-preview-${{ github.run_id }}
          path: email_preview.html
          if-no-files-found: ignore
          retention-days: 7
