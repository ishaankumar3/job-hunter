"on":
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  search-and-email:
    name: Search Jobs & Send Email
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Job Search
        env:
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          ADZUNA_APP_ID:     ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:    ${{ secrets.ADZUNA_APP_KEY }}
          REED_API_KEY:      ${{ secrets.REED_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python job_search.py

      - name: Save tracker back to repo
        if: always()
        run: |
          git config --global user.name  "Job Hunter Bot"
          git config --global user.email "actions@github.com"
          git add job_tracker.xlsx || true
          git add seen_jobs.json   || true
          if git diff --staged --quiet; then
            echo "No tracker changes to commit"
          else
            git commit -m "tracker: $(date +'%Y-%m-%d') daily update"
            git pull --rebase origin main || git pull --rebase origin master || true
            git push origin HEAD || true
          fi
